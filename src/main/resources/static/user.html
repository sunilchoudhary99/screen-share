<!DOCTYPE html>
<html lang="en">
<head>
    <title>User - Share Screen</title>
</head>
<body>
<button id="startBtn">Open</button>
<button id="stopBtn" disabled>Stop Sharing</button>
<p id="status" style="color: red; font-weight: bold;"></p>

<script>
    // Standard Browser WebSocket API
    const socket = new WebSocket('ws://localhost:8080/signaling');
    let peerConnection;
    let localStream;

    const configuration = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const status = document.getElementById('status');

<!--    localStream = await navigator.mediaDevices.getDisplayMedia({-->
<!--    video: {-->
<!--        width: { ideal: 1280 },-->
<!--        height: { ideal: 720 },-->
<!--        frameRate: { ideal: 15 } // Mobile battery aur data bachane ke liye 15-20 fps kaafi hai-->
<!--    },-->
<!--    audio: false-->
<!--});-->

    startBtn.onclick = async () => {
        try {
            localStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
            status.innerText = "🔴 Screen Sharing Active";
            startBtn.disabled = true;
            stopBtn.disabled = false;
             window.location.href = 'form.html';
            localStream.getVideoTracks()[0].onended = () => stopSharing();

            peerConnection = new RTCPeerConnection(configuration);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.onicecandidate = event => {
                if (event.candidate) {
                    socket.send(JSON.stringify({ type: 'ice-candidate', candidate: event.candidate }));
                }
            };

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.send(JSON.stringify({ type: 'offer', offer: offer }));

        } catch (err) {
            console.error("Error: ", err);
        }
    };

    socket.onmessage = async (event) => {
        const data = JSON.parse(event.data);

        if (data.type === 'answer') {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
        } else if (data.type === 'ice-candidate' && peerConnection) {
            await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
        }
    };

    function stopSharing() {
        if (localStream) localStream.getTracks().forEach(track => track.stop());
        if (peerConnection) peerConnection.close();
        status.innerText = "";
        startBtn.disabled = false;
        stopBtn.disabled = true;
    }
    stopBtn.onclick = stopSharing;
</script>
</body>
</html>

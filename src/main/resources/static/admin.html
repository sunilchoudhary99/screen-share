<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admin Dashboard</title>
    <style>video { width: 80%; border: 2px solid #333; background: #000; }</style>
</head>
<body>
<h2>Admin Dashboard - User Screen (Java Backend)</h2>
<video id="remoteVideo" autoplay playsinline controls></video>

<script>
    const socket = new WebSocket('ws://localhost:8080/signaling');
    let peerConnection;
    const remoteVideo = document.getElementById('remoteVideo');
    const configuration = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    socket.onopen = () => {
        // Server ko batayein ki yeh Admin hai
        socket.send(JSON.stringify({ type: 'join-admin' }));
    };

    socket.onmessage = async (event) => {
        const data = JSON.parse(event.data);

        if (data.type === 'offer') {
            peerConnection = new RTCPeerConnection(configuration);

            peerConnection.ontrack = (e) => {
                if (remoteVideo.srcObject !== e.streams[0]) {
                    remoteVideo.srcObject = e.streams[0];
                }
            };

            peerConnection.onicecandidate = ev => {
                if (ev.candidate) {
                    socket.send(JSON.stringify({ type: 'ice-candidate', candidate: ev.candidate }));
                }
            };

            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.send(JSON.stringify({ type: 'answer', answer: answer }));

        } else if (data.type === 'ice-candidate' && peerConnection) {
            await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
        }
    };
</script>
</body>
</html>
